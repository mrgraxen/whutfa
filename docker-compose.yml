services:
  headunit:
    image: ghcr.io/mrgraxen/android-auto:latest
    build: .
    container_name: headunit
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/bus/usb:/dev/bus/usb
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - ./config:/config:ro
    ports:
      - "${HTTP_PORT:-8080}:8080"
    environment:
      CONFIG_PATH: /config/config.yaml
      AA_STUB: ${AA_STUB:-0}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  headunit-cap-usb:
    profiles: ["cap_usb"]
    image: ghcr.io/mrgraxen/android-auto:latest
    build: .
    container_name: headunit
    restart: unless-stopped
    privileged: false
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/bus/usb:/dev/bus/usb
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - ./config:/config:ro
    ports:
      - "${HTTP_PORT:-8080}:8080"
    environment:
      CONFIG_PATH: /config/config.yaml
      AA_STUB: ${AA_STUB:-0}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  headunit-stub:
    profiles: ["stub"]
    image: ghcr.io/mrgraxen/android-auto:latest
    build: .
    container_name: headunit-stub
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:8080"
    volumes:
      - ./config:/config:ro
    environment:
      CONFIG_PATH: /config/config.yaml
      AA_STUB: "1"
